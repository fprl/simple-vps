---
# Developer tooling: shell UX + languages + agents.

# -----------------------------------------------------------------------------
# Shell
# -----------------------------------------------------------------------------

- name: Install shell tools (fzf, bat)
  apt:
    name:
      - fzf
      - bat
    state: present

- name: Create bat symlink (Ubuntu names it batcat)
  file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  ignore_errors: yes
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install lsd (amd64)
  apt:
    deb: https://github.com/lsd-rs/lsd/releases/download/v1.1.5/lsd_1.1.5_amd64.deb
  when:
    - ansible_facts['architecture'] == 'x86_64'
    - not ansible_check_mode

- name: Install zoxide
  shell: curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | bash
  args:
    creates: /usr/local/bin/zoxide
  when: not ansible_check_mode

- name: Install atuin
  shell: curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh
  args:
    creates: "/home/{{ admin_user }}/.atuin/bin/atuin"
  become: yes
  become_user: "{{ admin_user }}"
  environment:
    HOME: "/home/{{ admin_user }}"
  when: not ansible_check_mode

- name: Install Oh My Zsh (admin)
  become: yes
  become_user: "{{ admin_user }}"
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh
    dest: "/home/{{ admin_user }}/.oh-my-zsh"
    depth: 1

- name: Install zsh-autosuggestions plugin (admin)
  become: yes
  become_user: "{{ admin_user }}"
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "/home/{{ admin_user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1

- name: Install zsh-syntax-highlighting plugin (admin)
  become: yes
  become_user: "{{ admin_user }}"
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "/home/{{ admin_user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1

- name: Install Powerlevel10k theme (admin)
  become: yes
  become_user: "{{ admin_user }}"
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "/home/{{ admin_user }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1

# -----------------------------------------------------------------------------
# Languages & Package Managers
# -----------------------------------------------------------------------------

- name: Install Node.js LTS (NodeSource)
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  when: not ansible_check_mode

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install pnpm (npm global)
  npm:
    name: pnpm
    global: yes

- name: Install Bun (system-wide)
  shell: |
    set -e
    export BUN_INSTALL=/usr/local
    curl -fsSL https://bun.com/install | bash
  args:
    creates: /usr/local/bin/bun
  when: not ansible_check_mode

- name: Install uv (system-wide)
  shell: |
    set -e
    export UV_INSTALL_DIR=/usr/local/bin
    export UV_NO_MODIFY_PATH=1
    curl -fsSL https://astral.sh/uv/install.sh | sh
  args:
    creates: /usr/local/bin/uv
  when: not ansible_check_mode

- name: Install Rust toolchain (apt)
  apt:
    name:
      - rustc
      - cargo
    state: present

- name: Install Go (apt)
  apt:
    name: golang-go
    state: present

# -----------------------------------------------------------------------------
# Agents
# -----------------------------------------------------------------------------

- name: Install global npm agent CLIs
  npm:
    name: "{{ item }}"
    global: yes
  loop:
    - "@openai/codex"
    - "@google/gemini-cli"

- name: Install OpenCode CLI (admin)
  become: yes
  become_user: "{{ admin_user }}"
  shell: |
    set -e
    export HOME="/home/{{ admin_user }}"
    curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path
  args:
    creates: /usr/local/bin/opencode
  when: not ansible_check_mode

- name: Resolve OpenCode path after install (admin)
  become: yes
  become_user: "{{ admin_user }}"
  shell: |
    set -e
    export HOME="/home/{{ admin_user }}"
    for p in \
      "$HOME/.opencode/bin/opencode" \
      "$HOME/.local/bin/opencode" \
      "$HOME/.local/share/opencode/bin/opencode" \
      "$HOME/.cargo/bin/opencode"; do
      if [ -x "$p" ]; then
        echo "$p"
        exit 0
      fi
    done

    # Last resort: shallow search in HOME.
    found="$(find "$HOME" -maxdepth 4 -type f -name opencode -perm -111 2>/dev/null | head -n 1 || true)"
    if [ -n "$found" ]; then
      echo "$found"
      exit 0
    fi

    exit 1
  register: opencode_path
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Symlink opencode into /usr/local/bin
  file:
    src: "{{ opencode_path.stdout }}"
    dest: /usr/local/bin/opencode
    state: link
  when:
    - not ansible_check_mode
    - opencode_path.rc == 0
    - opencode_path.stdout != '/usr/local/bin/opencode'

- name: Check if Claude is already installed (admin)
  become: yes
  become_user: "{{ admin_user }}"
  ansible.builtin.shell:
    cmd: |
      set -e
      export HOME="/home/{{ admin_user }}"
      if [ -x /usr/local/bin/claude ]; then echo /usr/local/bin/claude; exit 0; fi
      if [ -x "$HOME/.local/bin/claude" ]; then echo "$HOME/.local/bin/claude"; exit 0; fi
      command -v claude
  register: claude_which_before
  changed_when: false
  failed_when: false

- name: Install Claude Code (admin; native installer, force IPv4, manual setup)
  become: yes
  become_user: "{{ admin_user }}"
  ansible.builtin.shell:
    cmd: |
      set -e
      export HOME="/home/{{ admin_user }}"

      # Claude's installer downloads from storage.googleapis.com which returns 403 over IPv6.
      # We use a shadow curl wrapper to force IPv4, but we CANNOT use the binary's "install"
      # command because it makes its own HTTP requests (not using curl) that also fail with 403.
      # Instead, we manually replicate what the install script does: download artifacts and
      # create the launcher.

      tmp="$(mktemp -d)"
      mkdir -p "$tmp/bin"
      printf '%s\n' '#!/bin/sh' 'exec /usr/bin/curl -4 "$@"' >"$tmp/bin/curl"
      chmod +x "$tmp/bin/curl"
      export PATH="$tmp/bin:$PATH"

      # GCS bucket and download directory
      GCS_BUCKET="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
      DOWNLOAD_DIR="$HOME/.claude/downloads"
      mkdir -p "$DOWNLOAD_DIR"

      # Detect platform
      case "$(uname -s)" in
        Darwin) os="darwin" ;;
        Linux) os="linux" ;;
        *) echo "Unsupported OS: $(uname -s)" >&2; exit 1 ;;
      esac

      case "$(uname -m)" in
        x86_64|amd64) arch="x64" ;;
        arm64|aarch64) arch="arm64" ;;
        *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
      esac

      # Check for musl on Linux
      if [ "$os" = "linux" ]; then
        if [ -f /lib/libc.musl-x86_64.so.1 ] || [ -f /lib/libc.musl-aarch64.so.1 ] || ldd /bin/ls 2>&1 | grep -q musl; then
          platform="linux-${arch}-musl"
        else
          platform="linux-${arch}"
        fi
      else
        platform="${os}-${arch}"
      fi

      # Get latest version
      version=$(curl -fsSL "${GCS_BUCKET}/latest")

      # Download manifest
      manifest=$(curl -fsSL "${GCS_BUCKET}/${version}/manifest.json")

      # Extract checksum using jq if available, otherwise grep
      if command -v jq >/dev/null 2>&1; then
        checksum=$(echo "$manifest" | jq -r ".platforms[\"$platform\"].checksum")
      else
        checksum=$(echo "$manifest" | grep -oP '"'"$platform"'"[^}]*"checksum"\s*:\s*"\K[a-f0-9]{64}')
      fi

      # Download binary
      binary_path="${DOWNLOAD_DIR}/claude-${version}-${platform}"
      curl -fsSL -o "$binary_path" "${GCS_BUCKET}/${version}/${platform}/claude"

      # Verify checksum
      actual=$(sha256sum "$binary_path" | cut -d' ' -f1)
      if [ "$actual" != "$checksum" ]; then
        echo "Checksum verification failed" >&2
        rm -f "$binary_path"
        exit 1
      fi

      chmod +x "$binary_path"

      # Create launcher in ~/.local/bin (what "claude install" would do)
      mkdir -p "$HOME/.local/bin"
      ln -sf "$binary_path" "$HOME/.local/bin/claude"

      # Cleanup
      rm -rf "$tmp"
  args:
    creates: "/home/{{ admin_user }}/.local/bin/claude"
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - claude_which_before.rc != 0

- name: Check for Claude launcher in admin local bin
  stat:
    path: "/home/{{ admin_user }}/.local/bin/claude"
  register: claude_local_bin
  when: not ansible_check_mode

- name: Symlink claude into /usr/local/bin
  file:
    src: "/home/{{ admin_user }}/.local/bin/claude"
    dest: /usr/local/bin/claude
    state: link
  when:
    - not ansible_check_mode
    - claude_local_bin.stat.exists

# -----------------------------------------------------------------------------
# VPS defaults (per-user; create only)
# -----------------------------------------------------------------------------

- name: Install VPS-safe default .zshrc for admin (create only)
  copy:
    src: vps-defaults/zshrc
    dest: "/home/{{ admin_user }}/.zshrc"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'
    force: no

- name: Install VPS-safe default .gitconfig for admin (create only)
  copy:
    src: vps-defaults/gitconfig
    dest: "/home/{{ admin_user }}/.gitconfig"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'
    force: no
