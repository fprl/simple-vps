name = "php-plain"

[env.production]
server = "deploy@example.com"

[vars]
APP_ENV = "production"
APP_SECRET = "@secret:APP_SECRET"
DATABASE_PATH = "/data/app.sqlite"

[processes.web]
port = 8080
health = "/health"
resources = { memory = "256m", cpus = 0.5 }

[routes.app]
host = "php.example.com"
process = "web"
