name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax checks
        run: |
          bash -n install.sh
          bash -n packages/simple-vps/install.sh
          bash -n packages/simple-vps/tests/bootstrap_tarball_smoke.sh
      - name: Shellcheck
        run: |
          shellcheck install.sh packages/simple-vps/install.sh packages/simple-vps/tests/bootstrap_tarball_smoke.sh
      - name: Bootstrap tarball smoke test
        run: |
          packages/simple-vps/tests/bootstrap_tarball_smoke.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python syntax checks
        run: |
          PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile packages/simple-vps/roles/infra/files/simple-vps
      - name: Python tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s packages/simple-vps/tests

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible ansible-lint
      - name: Ansible syntax checks
        working-directory: packages/simple-vps
        run: |
          ansible-playbook --syntax-check playbooks/vps-bootstrap.yml
          ansible-playbook --syntax-check playbooks/vps-apply.yml
      - name: Ansible lint
        working-directory: packages/simple-vps
        run: |
          ansible-lint playbooks/vps-bootstrap.yml playbooks/vps-apply.yml
