name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax checks
        run: make shell-test
      - name: Shellcheck
        run: |
          # `tests/fake-vps/fake-*` includes non-shell helpers
          # (fake-podman.app.py, fake-podman.caddy.py) — exclude
          # anything with an extension so shellcheck only sees the
          # shell scripts.
          shell_scripts=$(find tests/fake-vps -maxdepth 1 -type f -name 'fake-*' ! -name '*.*')
          shellcheck install.sh $shell_scripts

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Go tests
        run: go test ./...
      - name: Go build
        run: go build ./...
      - name: Release builds
        run: make build-release
      - name: Go vet
        run: go vet ./...

  fake-vps-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - uses: oven-sh/setup-bun@v2
      - name: Go fake VPS smoke
        run: make fake-vps-smoke
      - name: Go fresh host install smoke
        run: make fake-vps-install-smoke
