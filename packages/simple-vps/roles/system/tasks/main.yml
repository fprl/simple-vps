---
# OS fundamentals + operator/deploy access.

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install essential packages
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - htop
      - tmux
      - unzip
      - jq
      - tree
      - ncdu
      - rsync
      - build-essential
      - python3-pip
      - ca-certificates
      - gnupg
      - apt-transport-https
    state: present

- name: Require separate operator and deploy users
  assert:
    that:
      - operator_user != deploy_user
    fail_msg: "operator_user and deploy_user must be different."

- name: Ensure operator primary group
  group:
    name: "{{ operator_user }}"
    state: present

- name: Create operator user
  user:
    name: "{{ operator_user }}"
    group: "{{ operator_user }}"
    shell: "{{ simple_vps_admin_shell | default('/bin/bash') }}"
    groups: sudo
    append: yes
    create_home: yes

- name: Allow operator user passwordless sudo
  copy:
    dest: /etc/sudoers.d/operator
    owner: root
    group: root
    content: "{{ operator_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Ensure deploy primary group
  group:
    name: "{{ deploy_user }}"
    state: present

- name: Create deploy user
  user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    shell: "{{ simple_vps_deploy_shell | default('/bin/bash') }}"
    create_home: yes

- name: Normalize provided SSH key list
  set_fact:
    simple_vps_provided_operator_ssh_public_keys: "{{ simple_vps_operator_ssh_public_keys | default(simple_vps_ssh_public_keys | default([])) }}"
    simple_vps_provided_deploy_ssh_public_keys: "{{ simple_vps_deploy_ssh_public_keys | default([]) }}"

- name: Check if root authorized_keys exists
  stat:
    path: /root/.ssh/authorized_keys
  register: simple_vps_root_authorized_keys
  when: simple_vps_provided_operator_ssh_public_keys | length == 0

- name: Read root authorized_keys when no explicit keys were provided
  slurp:
    path: /root/.ssh/authorized_keys
  register: simple_vps_root_keys_raw
  when:
    - simple_vps_provided_operator_ssh_public_keys | length == 0
    - simple_vps_root_authorized_keys.stat.exists

- name: Build effective SSH key list for operator user
  set_fact:
    simple_vps_effective_operator_ssh_public_keys: >-
      {{
        simple_vps_provided_operator_ssh_public_keys
        if (simple_vps_provided_operator_ssh_public_keys | length > 0)
        else (
          (simple_vps_root_keys_raw.content | default('') | b64decode).splitlines()
          | map('trim')
          | reject('equalto', '')
          | reject('match', '^#')
          | list
        )
      }}

- name: Build effective SSH key list for deploy user
  set_fact:
    simple_vps_effective_deploy_ssh_public_keys: >-
      {{
        simple_vps_provided_deploy_ssh_public_keys
        if (simple_vps_provided_deploy_ssh_public_keys | length > 0)
        else (
          simple_vps_effective_operator_ssh_public_keys
          if (simple_vps_allow_shared_ssh_key | default(false) | bool)
          else []
        )
      }}

- name: Add SSH authorized keys to operator user
  authorized_key:
    user: "{{ operator_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ simple_vps_effective_operator_ssh_public_keys }}"
  when: not ansible_check_mode

- name: Add SSH authorized keys to deploy user
  authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ simple_vps_effective_deploy_ssh_public_keys }}"
  when: not ansible_check_mode

- name: Warn when no SSH keys are available for operator user
  debug:
    msg: >-
      No SSH public keys were found for operator user provisioning.
      Set simple_vps_operator_ssh_public_keys explicitly if root has no authorized keys.
  when: simple_vps_effective_operator_ssh_public_keys | length == 0

- name: Warn when no SSH keys are available for deploy user
  debug:
    msg: >-
      No SSH public keys were found for deploy user provisioning.
      Set simple_vps_deploy_ssh_public_keys explicitly if root has no authorized keys.
  when: simple_vps_effective_deploy_ssh_public_keys | length == 0

- name: Set timezone
  timezone:
    name: "{{ simple_vps_timezone | default('UTC') }}"

- name: Set locale
  locale_gen:
    name: "{{ simple_vps_locale | default('en_US.UTF-8') }}"
    state: present
