---
# Chezmoi dotfiles bootstrap (best-effort; private repo may require keys).

- name: Install Chezmoi
  shell: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
  args:
    creates: /usr/local/bin/chezmoi
  when: not ansible_check_mode

- name: Initialize Chezmoi with dotfiles repo (non-interactive, may fail)
  become: yes
  become_user: "{{ admin_user }}"
  shell: |
    export HOME="/home/{{ admin_user }}"
    export GIT_TERMINAL_PROMPT=0
    export GIT_SSH_COMMAND='ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=7'
    chezmoi init {{ github_repo }} --apply
  args:
    creates: "/home/{{ admin_user }}/.local/share/chezmoi"
  environment:
    HOME: "/home/{{ admin_user }}"
  ignore_errors: yes
  when:
    - not ansible_check_mode
    - github_repo is defined
    - github_repo | length > 0
