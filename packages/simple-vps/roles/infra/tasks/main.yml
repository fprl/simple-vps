---
# Caddy local ingress by default. Litestream is a production primitive for
# SQLite backup workflows. Docker remains available only as an explicit opt-in.

- name: Set Docker apt architecture
  set_fact:
    infra_docker_apt_arch: >-
      {{
        {
          'x86_64': 'amd64',
          'aarch64': 'arm64'
        }.get(ansible_facts['architecture'], ansible_facts['architecture'])
      }}
  when: simple_vps_install_docker | default(false) | bool

- name: Install Docker runtime
  block:
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch={{ infra_docker_apt_arch }}] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Add admin user to docker group
      user:
        name: "{{ admin_user }}"
        groups: docker
        append: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create Docker daemon config
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: Restart Docker
  when: simple_vps_install_docker | default(false) | bool

- name: Set Litestream package facts
  set_fact:
    infra_litestream_version: "{{ simple_vps_litestream_version | default('0.5.8') }}"
    infra_litestream_package_arch: >-
      {{
        {
          'x86_64': 'x86_64',
          'aarch64': 'arm64'
        }.get(ansible_facts['architecture'], '')
      }}
  when: simple_vps_install_litestream | default(true) | bool

- name: Fail on unsupported Litestream architecture
  fail:
    msg: "Litestream install is not configured for architecture {{ ansible_facts['architecture'] }}."
  when:
    - simple_vps_install_litestream | default(true) | bool
    - infra_litestream_package_arch | length == 0

- name: Download Litestream package
  get_url:
    url: >-
      {{
        simple_vps_litestream_deb_url
        | default('https://github.com/benbjohnson/litestream/releases/download/v' ~ infra_litestream_version ~ '/litestream-' ~ infra_litestream_version ~ '-linux-' ~ infra_litestream_package_arch ~ '.deb')
      }}
    dest: "/tmp/litestream-{{ infra_litestream_version }}-linux-{{ infra_litestream_package_arch }}.deb"
    owner: root
    group: root
    mode: '0644'
  when: simple_vps_install_litestream | default(true) | bool

- name: Install Litestream package
  apt:
    deb: "/tmp/litestream-{{ infra_litestream_version }}-linux-{{ infra_litestream_package_arch }}.deb"
    state: present
  when: simple_vps_install_litestream | default(true) | bool

- name: Create Simple VPS state directory
  file:
    path: /etc/simple-vps
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create Simple VPS backup directory
  file:
    path: /etc/simple-vps/backups
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Initialize Simple VPS state file
  copy:
    dest: /etc/simple-vps/state.json
    owner: root
    group: root
    mode: '0644'
    force: no
    content: |
      {
        "routes": [],
        "version": 2
      }

- name: Install Simple VPS CLI
  copy:
    src: simple-vps
    dest: /usr/local/bin/simple-vps
    owner: root
    group: root
    mode: '0755'

- name: Add Caddy GPG key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy repository
  apt_repository:
    repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: yes

- name: Create Simple VPS Caddy directory
  file:
    path: /etc/caddy/simple-vps
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create user Caddy snippets directory
  file:
    path: /etc/caddy/conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create www directory
  file:
    path: /var/www/html
    state: directory
    owner: caddy
    group: caddy
    mode: '0755'

- name: Enable and start Caddy
  systemd:
    name: caddy
    enabled: yes
    state: started

- name: Generate Simple VPS Caddyfile from state
  command: simple-vps generate-caddy
  register: infra_generate_caddy
  changed_when: "'Generated ' in infra_generate_caddy.stdout"

- name: Set Cloudflare Tunnel service mode
  set_fact:
    infra_cloudflare_tunnel_service_mode: >-
      {{
        'token'
        if (simple_vps_cloudflare_tunnel_token | default('') | length) > 0
        else (
          'config'
          if (simple_vps_cloudflare_tunnel_config_path | default('') | length) > 0
          else 'none'
        )
      }}
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Add Cloudflare package key
  get_url:
    url: https://pkg.cloudflare.com/cloudflare-main.gpg
    dest: /usr/share/keyrings/cloudflare-main.gpg
    owner: root
    group: root
    mode: '0644'
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Add cloudflared repository
  copy:
    dest: /etc/apt/sources.list.d/cloudflared.list
    owner: root
    group: root
    mode: '0644'
    content: |
      deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Install cloudflared
  apt:
    name: cloudflared
    state: present
    update_cache: yes
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Create cloudflared group
  group:
    name: cloudflared
    system: yes
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Create cloudflared user
  user:
    name: cloudflared
    group: cloudflared
    home: /var/lib/cloudflared
    shell: /usr/sbin/nologin
    system: yes
    create_home: yes
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Create cloudflared config directory
  file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: cloudflared
    mode: '0750'
  when: simple_vps_enable_cloudflare_tunnel | default(true) | bool

- name: Write Cloudflare Tunnel token file
  copy:
    dest: /etc/cloudflared/tunnel-token
    owner: root
    group: cloudflared
    mode: '0640'
    content: "{{ simple_vps_cloudflare_tunnel_token | trim }}\n"
  no_log: true
  notify: Restart cloudflared
  when:
    - simple_vps_enable_cloudflare_tunnel | default(true) | bool
    - infra_cloudflare_tunnel_service_mode | default('none') == 'token'

- name: Install cloudflared systemd service
  copy:
    dest: /etc/systemd/system/cloudflared.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Cloudflare Tunnel
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=cloudflared
      Group=cloudflared
      ExecStart={{ infra_cloudflare_tunnel_exec_start }}
      Restart=on-failure
      RestartSec=5s
      TimeoutStartSec=0
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=full

      [Install]
      WantedBy=multi-user.target
  vars:
    infra_cloudflare_tunnel_exec_start: >-
      {% if infra_cloudflare_tunnel_service_mode == 'token' -%}
      /usr/bin/cloudflared tunnel --no-autoupdate run --token-file /etc/cloudflared/tunnel-token
      {%- else -%}
      /usr/bin/cloudflared --config {{ simple_vps_cloudflare_tunnel_config_path }} tunnel run
      {%- endif %}
  notify: Restart cloudflared
  when:
    - simple_vps_enable_cloudflare_tunnel | default(true) | bool
    - infra_cloudflare_tunnel_service_mode | default('none') != 'none'

- name: Enable and start cloudflared
  systemd:
    name: cloudflared
    daemon_reload: yes
    enabled: yes
    state: started
  when:
    - simple_vps_enable_cloudflare_tunnel | default(true) | bool
    - infra_cloudflare_tunnel_service_mode | default('none') != 'none'

- name: Warn when Cloudflare Tunnel service is not configured
  debug:
    msg: >-
      cloudflared is installed, but no tunnel token or config path was provided.
      The systemd service is not enabled yet. Provide
      SIMPLE_VPS_CLOUDFLARE_TUNNEL_TOKEN for a remotely-managed tunnel, or
      SIMPLE_VPS_CLOUDFLARE_TUNNEL_CONFIG for an existing local config.
      Cloudflare public hostnames should route to http://127.0.0.1:8080.
  when:
    - simple_vps_enable_cloudflare_tunnel | default(true) | bool
    - infra_cloudflare_tunnel_service_mode | default('none') == 'none'
