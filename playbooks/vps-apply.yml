---
# Full converge. Run as admin after verifying admin SSH works.

- name: VPS apply
  hosts: "{{ target | default('vps') }}"
  become: true

  vars:
    admin_user: "{{ simple_vps_admin_user | default('admin') }}"
    simple_vps_timezone: "{{ simple_vps_timezone | default('UTC') }}"
    simple_vps_locale: "{{ simple_vps_locale | default('en_US.UTF-8') }}"
    simple_vps_ssh_public_keys: "{{ simple_vps_ssh_public_keys | default([]) }}"

  roles:
    - { role: system }
    - { role: security }
    - { role: infra }
    - { role: dev }
